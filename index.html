<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Demo Git - Contador</title>
  <link rel="stylesheet" href="estilos.css">
</head>

<body>
  <main>
    <h1>Contador Simples</h1>
    <p>Projeto básico para aprender Git</p>
    <p>Teste de commit</p>

    <div class="contador">
      <span id="valor">0</span>
    </div>

    <div class="botoes">
      <button id="btn-menos">-</button>
      <button id="btn-mais">+</button>
      <button id="btn-reset">Zerar</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>

</html>
